<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비주얼 DJ — 핸드 제스처</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>비주얼 DJ — 손 제스처 컨트롤</h1>

<div class="instrument-row" id="instRow">
  <button class="inst-btn active" data-inst="danso">🎋 단소</button>
  <button class="inst-btn" data-inst="piano">🎹 피아노</button>
  <button class="inst-btn" data-inst="violin">🎻 바이올린</button>
  <button class="inst-btn" data-inst="flute">🪈 플루트</button>
  <button class="inst-btn" data-inst="cello">🎻 첼로</button>
  <button class="inst-btn" data-inst="guitar">🎸 기타</button>
  <button class="inst-btn" data-inst="organ">🎺 오르간</button>
</div>

<div class="scale-row">
  <button class="scale-btn active" data-scale="korean">국악 음계</button>
  <button class="scale-btn" data-scale="western">서양 음계</button>
</div>

<button id="startBtn">카메라 + 사운드 시작하기</button>

<div class="stage" id="mainStage" style="display:none;">
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas id="overlayCanvas"></canvas>
  <div class="hud-left">
    <div class="hud-label">왼손</div>
    <div class="hud-label">볼륨</div>
    <div class="track"><div class="vol-fill" id="volFill" style="height:60%;"></div></div>
    <div class="hud-val" id="volVal">60</div>
  </div>
  <div class="hud-right">
    <div class="hud-label">오른손</div>
    <div class="hud-label">음역대</div>
    <div class="track"><div class="pitch-fill" id="pitchFill" style="height:50%;"></div></div>
    <div class="hud-val" id="pitchVal">황</div>
  </div>
  <div class="vib-ring" id="vibRing"></div>
  <div class="status-bar" id="statusBar">손을 카메라에 보여주세요</div>
  <div class="sound-dot" id="soundDot"></div>
  <div class="inst-label" id="instLabel">단소 · 국악</div>
  <div class="load-bar" id="loadBar"></div>
</div>

<div class="info-row" id="infoRow" style="display:none;">
  <div class="info-card"><div class="lbl">볼륨</div><div class="val" id="cardVol">60%</div></div>
  <div class="info-card"><div class="lbl">음</div><div class="val" id="cardPitch">황</div></div>
  <div class="info-card"><div class="lbl">진동</div><div class="val" id="cardVib">50%</div></div>
</div>

<div class="rec-row" id="recRow" style="display:none;">
  <button class="rec-ctrl-btn" id="recBtn">● 녹음</button>
  <button class="rec-ctrl-btn" id="playBtn" disabled>▶ 재생</button>
  <button class="rec-ctrl-btn" id="dlBtn" disabled>↓ 저장</button>
  <span class="rec-time" id="recTime">00:00</span>
</div>
<audio id="recAudio"></audio>

<div class="guide">
  <div class="guide-row"><span class="badge badge-l">왼손</span> 위로 올리면 볼륨 크게 — 아래로 내리면 작게</div>
  <div class="guide-row"><span class="badge badge-r">오른손</span> 위로 올리면 음이 높아짐 — 아래로 내리면 낮아짐</div>
  <div class="guide-row"><span class="badge badge-r">오른손</span> 활짝 펼치면 비브라토 강해짐 — 오므리면 약해짐</div>
  <div class="guide-row" style="color:#555;font-size:12px;">악기 첫 선택 시 샘플 로딩 (1~3초) 후 소리 남 · 단소는 즉시 재생</div>
</div>

<!-- Tone.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="script.js"></script>
</body>
</html>
